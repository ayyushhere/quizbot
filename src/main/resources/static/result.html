<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizBot - Performance Card</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="app-shell topbar">
        <a class="brand" href="dashboard.html">
            <span class="brand-mark"><i data-lucide="sparkles"></i></span>
            <span class="text-2xl font-black">QuizBot</span>
        </a>
        <nav class="nav-links">
            <a class="nav-link" href="dashboard.html"><i data-lucide="layout-dashboard"></i><span>Dashboard</span></a>
            <a class="nav-link" href="quiz.html" id="nav-quiz-link"><i data-lucide="list-checks"></i><span>Quiz</span></a>
            <a class="nav-link active" href="result.html"><i data-lucide="trophy"></i><span>Results</span></a>
            <a class="nav-link" href="admin.html" id="nav-admin-link" style="display: none;"><i data-lucide="shield-check"></i><span>Admin Control</span></a>
            <button class="nav-link" type="button" onclick="logout(event)"><i data-lucide="log-out"></i><span>Logout</span></button>
        </nav>
    </header>

    <main class="app-shell page-grid animate-fade-in">
        <!-- Results Gauge Sidebar -->
        <aside class="panel text-center flex flex-col gap-5">
            <div class="relative py-4">
                <i data-lucide="trophy" class="mx-auto" style="width: 64px; height: 64px; color: var(--warning); filter: drop-shadow(0 0 15px rgba(245, 158, 11, 0.4));"></i>
            </div>
            <div>
                <h1 class="text-5xl font-black text-white" id="result-percent">0%</h1>
                <p class="font-bold text-slate-400 mt-1">Accuracy Achieved</p>
            </div>
            <div class="space-y-2 mt-4">
                <button class="btn btn-primary w-full" onclick="retryLastQuiz()"><i data-lucide="rotate-ccw"></i> Restart Test</button>
                <a class="btn w-full" href="dashboard.html"><i data-lucide="home"></i> Dashboard</a>
            </div>
        </aside>

        <!-- Detailed Breakdown -->
        <section class="space-y-6">
            <!-- Score Overview Card -->
            <section class="panel">
                <div>
                    <p class="text-xs font-bold text-slate-400 uppercase tracking-wider">Evaluation Sheet</p>
                    <h2 class="text-3xl font-black mt-1" id="result-quiz-title">Quiz Title</h2>
                </div>

                <div class="mt-6 grid gap-4 sm:grid-cols-3">
                    <div class="stat card">
                        <i data-lucide="check-circle" style="color: var(--success);"></i>
                        <strong class="text-3xl" id="result-score">0 / 0</strong>
                        <span class="font-bold text-slate-400">Correct Answers</span>
                    </div>
                    <div class="stat card">
                        <i data-lucide="calendar"></i>
                        <strong class="text-xl" id="result-date" style="padding-top: 6px; padding-bottom: 6px;">Today</strong>
                        <span class="font-bold text-slate-400">Submission Date</span>
                    </div>
                    <div class="stat card">
                        <i data-lucide="clock" style="color: var(--accent);"></i>
                        <strong class="text-3xl" id="result-time">N/A</strong>
                        <span class="font-bold text-slate-400">Time Taken</span>
                    </div>
                </div>

                <div class="mt-6 progress-track">
                    <div class="progress-fill" id="result-progress-fill" style="width: 0%"></div>
                </div>
            </section>

            <!-- Diagnostic Review (Breakdown of right/wrong answers) -->
            <section class="panel">
                <h3 class="text-2xl font-black mb-4">Question Breakdown</h3>
                <div class="space-y-4" id="result-breakdown-list">
                    <div class="text-slate-400 text-center py-4">No breakdown available for this attempt.</div>
                </div>
            </section>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
