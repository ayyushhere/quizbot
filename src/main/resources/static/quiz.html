<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizBot Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="app-shell topbar">
        <a class="brand" href="dashboard.html">
            <span class="brand-mark"><i data-lucide="sparkles"></i></span>
            <span class="text-2xl">QuizBot</span>
        </a>
        <nav class="nav-links">
            <a class="nav-link" href="dashboard.html"><i data-lucide="layout-dashboard"></i><span>Dashboard</span></a>
            <a class="nav-link active" href="quiz.html"><i data-lucide="list-checks"></i><span>Quiz</span></a>
            <a class="nav-link" href="result.html"><i data-lucide="trophy"></i><span>Result</span></a>
            <a class="nav-link" href="admin-login.html"><i data-lucide="shield-check"></i><span>Admin Login</span></a>
            <button class="nav-link" type="button" onclick="logout(event)"><i data-lucide="log-out"></i><span>Logout</span></button>
        </nav>
    </header>

    <main class="app-shell page-grid">
        <aside class="panel p-5">
            <div class="flex items-center gap-4">
                <img class="w-24" src="assets/quiz-ai-mascot.png" alt="Cartoon AI quiz tutor mascot">
                <div>
                    <p class="text-sm font-black text-slate-500" data-quiz-category>Spring Boot</p>
                    <h1 class="text-2xl font-black" data-quiz-title>Basics Quiz</h1>
                </div>
            </div>
            <div class="mt-6">
                <div class="mb-2 flex items-center justify-between font-black">
                    <span>Answered</span>
                    <span data-progress-label>0/3</span>
                </div>
                <div class="progress-track">
                    <div class="progress-fill" data-progress style="width: 0%"></div>
                </div>
            </div>
            <a class="btn btn-yellow mt-4 w-full" href="dashboard.html">
                <i data-lucide="layout-dashboard"></i>
                Change quiz
            </a>
            <button class="btn btn-coral mt-6 w-full" type="button" onclick="submitDemoQuiz()">
                <i data-lucide="send"></i>
                Submit answers
            </button>
            <button class="btn mt-4 w-full" type="button" onclick="logout(event)">
                <i data-lucide="log-out"></i>
                Logout
            </button>
        </aside>

        <section class="grid gap-5" data-quiz></section>
    </main>
    <script src="app.js"></script>
</body>
</html>
