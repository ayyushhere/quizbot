spring.application.name=quiz-system

# MySQL database connection.
# Replace username/password with your local MySQL credentials.
spring.datasource.url=jdbc:mysql://localhost:3306/quiz_system?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=rootpassword
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# For beginners: update creates missing tables/columns from JPA entities.
# For production, prefer validate or none and manage schema changes manually.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Runs schema.sql/data.sql on startup. schema.sql uses IF NOT EXISTS, so it is safe for repeated starts.
spring.sql.init.mode=always

server.port=8081
