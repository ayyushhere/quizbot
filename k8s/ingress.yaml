---
# Ingress for Production - Routes external traffic to the service
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: quiz-system-ingress
  namespace: quiz-system
  labels:
    app: quiz-system
  annotations:
    # NGINX Controller annotations
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    
    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-connections: "10"
    
    # Security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
    
    # CORS
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://quiz.example.com"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    
    # Timeouts
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    
    # Proxy settings
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-buffering: "on"

spec:
  ingressClassName: nginx
  
  # TLS configuration
  tls:
  - hosts:
    - quiz.example.com
    - api.quiz.example.com
    secretName: quiz-system-tls
  
  # Rules
  rules:
  # Main domain
  - host: quiz.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: quiz-system-service
            port:
              number: 8080
  
  # API subdomain
  - host: api.quiz.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: quiz-system-service
            port:
              number: 8080

---
# Ingress for Staging
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: quiz-system-ingress
  namespace: staging
  labels:
    app: quiz-system
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-staging"

spec:
  ingressClassName: nginx
  
  tls:
  - hosts:
    - staging-quiz.example.com
    secretName: quiz-system-staging-tls
  
  rules:
  - host: staging-quiz.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: quiz-system-service
            port:
              number: 8080
