---
# ConfigMap for application configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: quiz-system-config
  namespace: quiz-system
  labels:
    app: quiz-system
data:
  # Spring Boot Configuration
  SPRING_PROFILES_ACTIVE: "production"
  SPRING_JPA_HIBERNATE_DDL_AUTO: "validate"
  SPRING_JPA_SHOW_SQL: "false"
  SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: "org.hibernate.dialect.MySQL8Dialect"
  SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL: "true"
  
  # Application Server Configuration
  SERVER_PORT: "8080"
  SERVER_SERVLET_CONTEXT_PATH: "/api"
  SERVER_COMPRESSION_ENABLED: "true"
  SERVER_COMPRESSION_MIN_RESPONSE_SIZE: "1024"
  
  # Connection Pool Settings
  SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "20"
  SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: "5"
  SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT: "30000"
  SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT: "600000"
  SPRING_DATASOURCE_HIKARI_MAX_LIFETIME: "1800000"
  
  # Logging Configuration
  LOGGING_LEVEL_ROOT: "INFO"
  LOGGING_LEVEL_COM_EXAMPLE_QUIZSYSTEM: "DEBUG"
  LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_WEB: "INFO"
  LOGGING_LEVEL_ORG_HIBERNATE: "WARN"
  LOGGING_PATTERN_CONSOLE: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
  
  # Security Configuration
  JWT_EXPIRATION_TIME: "86400000"  # 24 hours in milliseconds
  JWT_REFRESH_EXPIRATION_TIME: "604800000"  # 7 days
  
  # CORS Configuration
  CORS_ALLOWED_ORIGINS: "http://localhost:3000,https://quiz.example.com"
  CORS_ALLOWED_METHODS: "GET,POST,PUT,DELETE,OPTIONS"
  CORS_ALLOWED_HEADERS: "Content-Type,Authorization"
  CORS_ALLOW_CREDENTIALS: "true"

---
# Staging ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: quiz-system-config
  namespace: staging
  labels:
    app: quiz-system
data:
  SPRING_PROFILES_ACTIVE: "staging"
  SPRING_JPA_HIBERNATE_DDL_AUTO: "update"
  SERVER_PORT: "8080"
  LOGGING_LEVEL_ROOT: "DEBUG"
  CORS_ALLOWED_ORIGINS: "http://localhost:3000,https://staging-quiz.example.com"
