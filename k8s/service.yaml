---
# Service for Production Quiz System
apiVersion: v1
kind: Service
metadata:
  name: quiz-system-service
  namespace: quiz-system
  labels:
    app: quiz-system
  annotations:
    description: "Service exposing Quiz System backend"
spec:
  type: ClusterIP
  selector:
    app: quiz-system
    tier: backend
  ports:
  - name: http
    port: 8080
    targetPort: http
    protocol: TCP
  sessionAffinity: None

---
# Service for Staging
apiVersion: v1
kind: Service
metadata:
  name: quiz-system-service
  namespace: staging
  labels:
    app: quiz-system
spec:
  type: ClusterIP
  selector:
    app: quiz-system
    tier: backend
  ports:
  - name: http
    port: 8080
    targetPort: http
    protocol: TCP

---
# Headless Service for StatefulSets (if needed)
apiVersion: v1
kind: Service
metadata:
  name: quiz-system-headless
  namespace: quiz-system
  labels:
    app: quiz-system
spec:
  clusterIP: None
  selector:
    app: quiz-system
    tier: backend
  ports:
  - name: http
    port: 8080
    targetPort: http
