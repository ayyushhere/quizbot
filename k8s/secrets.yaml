---
# Secrets for sensitive data - IMPORTANT: Use external secrets management in production!
# In production, use AWS Secrets Manager, HashiCorp Vault, or Kubernetes External Secrets
apiVersion: v1
kind: Secret
metadata:
  name: quiz-system-secrets
  namespace: quiz-system
  labels:
    app: quiz-system
type: Opaque
stringData:
  # Database Configuration - CHANGE THESE VALUES!
  SPRING_DATASOURCE_URL: "jdbc:mysql://mysql-service:3306/quiz_system_prod?useSSL=false&serverTimezone=UTC"
  SPRING_DATASOURCE_USERNAME: "quiz_admin"
  SPRING_DATASOURCE_PASSWORD: "ChangeMe@SecurePassword123"
  
  # JWT Secret Key - Generate: openssl rand -base64 32
  JWT_SECRET_KEY: "your-super-secret-jwt-key-change-this-in-production"
  
  # Email Configuration (for notifications)
  MAIL_USERNAME: "noreply@quiz.example.com"
  MAIL_PASSWORD: "email-app-password"
  
  # AWS S3 Credentials (if using for file uploads)
  AWS_ACCESS_KEY_ID: "your-aws-access-key"
  AWS_SECRET_ACCESS_KEY: "your-aws-secret-key"
  AWS_REGION: "us-east-1"
  AWS_S3_BUCKET: "quiz-system-prod"

---
# Staging Secrets
apiVersion: v1
kind: Secret
metadata:
  name: quiz-system-secrets
  namespace: staging
  labels:
    app: quiz-system
type: Opaque
stringData:
  SPRING_DATASOURCE_URL: "jdbc:mysql://mysql-service:3306/quiz_system_staging?useSSL=false&serverTimezone=UTC"
  SPRING_DATASOURCE_USERNAME: "quiz_staging_user"
  SPRING_DATASOURCE_PASSWORD: "StagingPassword123"
  JWT_SECRET_KEY: "staging-jwt-secret-key-change-this"
  MAIL_USERNAME: "staging@quiz.example.com"
  MAIL_PASSWORD: "staging-email-password"

---
# Docker Registry Secret (for pulling images from GitHub Container Registry)
apiVersion: v1
kind: Secret
metadata:
  name: ghcr-secret
  namespace: quiz-system
type: kubernetes.io/dockercfg
stringData:
  .dockercfg: |
    {
      "ghcr.io": {
        "auth": "YOUR_BASE64_ENCODED_GITHUB_TOKEN_HERE",
        "email": "your-email@example.com"
      }
    }

---
# TLS Certificate Secret (for HTTPS)
apiVersion: v1
kind: Secret
metadata:
  name: quiz-system-tls
  namespace: quiz-system
type: kubernetes.io/tls
data:
  # Generate: openssl req -x509 -nodes -days 365 -newkey rsa:2048 -keyout tls.key -out tls.crt
  tls.crt: LS0tLS1CRUdJTiBDRVJUSUZJQ0FURS0tLS0t...  # Replace with base64 encoded certificate
  tls.key: LS0tLS1CRUdJTiBQUklWQVRFIEtFWS0tLS0t...  # Replace with base64 encoded key
