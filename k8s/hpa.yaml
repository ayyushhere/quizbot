---
# Horizontal Pod Autoscaler - Automatically scales pods based on CPU/Memory
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: quiz-system-hpa
  namespace: quiz-system
  labels:
    app: quiz-system
spec:
  # Reference to the deployment to scale
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: quiz-system-prod
  
  # Min and max replicas
  minReplicas: 3
  maxReplicas: 10
  
  # Metrics to monitor
  metrics:
  # CPU-based scaling
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70  # Scale up when CPU > 70%
  
  # Memory-based scaling
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80  # Scale up when Memory > 80%
  
  # Custom metrics (requires Prometheus)
  - type: Pods
    pods:
      metric:
        name: http_requests_per_second
      target:
        type: AverageValue
        averageValue: "1000"
  
  # Behavior configuration
  behavior:
    # Scale up behavior
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100  # Double the number of pods
        periodSeconds: 30
      - type: Pods
        value: 2    # Add 2 pods
        periodSeconds: 30
      selectPolicy: Max
    
    # Scale down behavior
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50   # Remove 50% of pods
        periodSeconds: 60
      - type: Pods
        value: 1    # Remove 1 pod
        periodSeconds: 60
      selectPolicy: Min

---
# Staging HPA (less aggressive)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: quiz-system-hpa
  namespace: staging
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: quiz-system-staging
  
  minReplicas: 2
  maxReplicas: 5
  
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
