---
# Namespace for Quiz System - Isolates resources in the cluster
apiVersion: v1
kind: Namespace
metadata:
  name: quiz-system
  labels:
    app: quiz-system
    environment: production
  annotations:
    description: "Namespace for Online Quiz System resources"

---
# Staging Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: staging
  labels:
    app: quiz-system
    environment: staging
  annotations:
    description: "Namespace for staging environment"
